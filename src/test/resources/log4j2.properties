status = warn

# Root logger
rootLogger.level = info
rootLogger.appenderRefs = console, file
rootLogger.appenderRef.console.ref = ConsoleAppender
rootLogger.appenderRef.file.ref = FileAppender

# Console Appender
appender.console.type = Console
appender.console.name = ConsoleAppender
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = [%d{HH:mm:ss}] [%t] %-5level %logger{36} - %msg%n

# File Appender
appender.file.type = File
appender.file.name = FileAppender
appender.file.fileName = logs/application.log  
appender.file.append = true
appender.file.layout.type = PatternLayout
appender.file.layout.pattern = [%d{yyyy-MM-dd HH:mm:ss}] %-5level %c{1} - %msg%n

# Package-specific logger
logger.caya.name = com.caya
logger.caya.level = debug
logger.caya.additivity = false
logger.caya.appenderRefs = console, file
logger.caya.appenderRef.console.ref = ConsoleAppender
logger.caya.appenderRef.file.ref = FileAppender